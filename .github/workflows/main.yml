name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # إضافة خطوة للتحقق من وجود الملف قبل محاولة تنفيذ chmod
      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -f "./app/gradlew" ]; then
            chmod +x ./app/gradlew
            ./app/gradlew assembleDebug
          else
            echo "Gradle wrapper not found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WolfTrader
          path: |
            **/build/outputs/apk/debug/*.apk
