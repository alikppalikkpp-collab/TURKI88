name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # التأكد من وجود الملف ثم إعطاؤه الصلاحية
      - name: Grant execute permission
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "gradlew not found in root, skipping chmod"
          fi

      # بناء التطبيق
      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WolfTrader
          path: app/build/outputs/apk/debug/app-debug.apk
