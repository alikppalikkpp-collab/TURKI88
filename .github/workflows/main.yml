name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # هذا الأمر يبحث عن gradlew في المجلد الرئيسي أو داخل مجلد app ويقوم بتنفيذه
      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug
          elif [ -f "./app/gradlew" ]; then
            chmod +x ./app/gradlew
            ./app/gradlew :app:assembleDebug
          else
            echo "Error: gradlew file not found. Please ensure it is uploaded."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WolfTrader
          path: app/build/outputs/apk/debug/app-debug.apk
